# Standard Android project properties

org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Configuration cache has known incompatibilities with AGP 8.11+ on Gradle 9.x.
# Disabled until the Kotlin Gradle plugin resolves the DefaultProvider serialization issue.
org.gradle.configuration-cache=false

org.gradle.parallel=true

android.useAndroidX=true
kotlin.code.style=official