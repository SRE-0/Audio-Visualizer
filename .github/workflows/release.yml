name: Build, Publish and Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Build, publish to GitHub Packages and create Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          echo "y" | sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant Gradle wrapper permissions
        run: chmod +x gradlew

      - name: Generate version name
        id: version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION="1.0.${COMMIT_COUNT}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Build release AAR
        run: ./gradlew :audiovisualizer:assembleRelease --no-daemon --stacktrace

      # -----------------------------------------------------------------------
      # Publish to GitHub Packages
      # GITHUB_TOKEN is used as the password — the username is hardcoded
      # in build.gradle.kts to avoid case sensitivity issues with GITHUB_ACTOR
      # -----------------------------------------------------------------------
      - name: Publish to GitHub Packages
        run: |
          ./gradlew :audiovisualizer:publishReleasePublicationToGitHubPackagesRepository \
            --no-daemon \
            -Pversion_name=${{ steps.version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename AAR with version
        run: |
          AAR_PATH=$(find . -name "*.aar" -path "*/outputs/aar/*" | head -1)
          if [ -z "${AAR_PATH}" ]; then
            echo "ERROR: No AAR file found"
            exit 1
          fi
          echo "Found AAR at: ${AAR_PATH}"
          NEW_NAME="audiovisualizer-${{ steps.version.outputs.version }}.aar"
          cp "${AAR_PATH}" "${NEW_NAME}"
          echo "aar_file=${NEW_NAME}" >> $GITHUB_ENV

      - name: Write release notes
        run: |
          cat > release_notes.md << 'NOTES'
          ## Flux AudioVisualizer ${{ steps.version.outputs.version }}

          Published to GitHub Packages. Import directly in any Android project.

          ### Option 1 - Gradle import (recommended)

          Step 1 - Add the repository to your settings.gradle.kts:

          dependencyResolutionManagement {
              repositories {
                  google()
                  mavenCentral()
                  maven {
                      name = "GitHubPackages"
                      url  = uri("https://maven.pkg.github.com/SRE-0/Audio-Visualizer")
                      credentials {
                          username = "YOUR_GITHUB_USERNAME"
                          password = providers.gradleProperty("gpr.key").orNull
                                     ?: System.getenv("GITHUB_TOKEN")
                      }
                  }
              }
          }

          Step 2 - Add the dependency to your build.gradle.kts:

          dependencies {
              implementation("com.sre404.audiovisualizer:audiovisualizer:${{ steps.version.outputs.version }}")
          }

          Step 3 - Add your token to ~/.gradle/gradle.properties (never commit this file):

          gpr.key=YOUR_GITHUB_PERSONAL_ACCESS_TOKEN

          The token needs the read:packages scope.
          Generate it at: GitHub Settings > Developer settings > Personal access tokens

          ### Option 2 - Manual AAR import

          1. Download audiovisualizer-${{ steps.version.outputs.version }}.aar
          2. Copy it to your app libs/ folder
          3. Add to your build.gradle.kts:

          dependencies {
              implementation(files("libs/audiovisualizer-${{ steps.version.outputs.version }}.aar"))
          }

          ### Commit
          ${{ github.sha }}
          NOTES

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Flux AudioVisualizer ${{ steps.version.outputs.version }}"
          body_path: release_notes.md
          files: ${{ env.aar_file }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}