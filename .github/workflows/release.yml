name: Build and Release AAR

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Build AAR and create GitHub Release
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          echo "y" | sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant Gradle wrapper permissions
        run: chmod +x gradlew

      # -----------------------------------------------------------------------
      # Debug: show project structure so we can verify module name and location
      # -----------------------------------------------------------------------
      - name: Show project structure
        run: |
          echo "=== Root directory ==="
          ls -la
          echo ""
          echo "=== settings.gradle.kts ==="
          cat settings.gradle.kts || cat settings.gradle || echo "settings file not found"
          echo ""
          echo "=== Gradle modules ==="
          ./gradlew projects --no-daemon 2>&1 | head -40

      - name: Generate version name
        id: version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION="1.0.${COMMIT_COUNT}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      # -----------------------------------------------------------------------
      # Build with full stacktrace so any Gradle error is visible
      # -----------------------------------------------------------------------
      - name: Build release AAR
        run: ./gradlew :audiovisualizer:assembleRelease --no-daemon --stacktrace

      # -----------------------------------------------------------------------
      # Debug: show everything under build/ to find the actual AAR path
      # -----------------------------------------------------------------------
      - name: Show build outputs
        run: |
          echo "=== Build outputs ==="
          find . -name "*.aar" 2>/dev/null || echo "No AAR files found"

      # -----------------------------------------------------------------------
      # Locate the AAR dynamically — works regardless of exact subfolder
      # -----------------------------------------------------------------------
      - name: Rename AAR with version
        run: |
          AAR_PATH=$(find . -name "*.aar" -path "*/outputs/aar/*" | head -1)

          if [ -z "${AAR_PATH}" ]; then
            echo "ERROR: No AAR file found after build"
            exit 1
          fi

          echo "Found AAR at: ${AAR_PATH}"
          NEW_NAME="flux-audiovisualizer-${{ steps.version.outputs.version }}.aar"
          cp "${AAR_PATH}" "${NEW_NAME}"
          echo "aar_file=${NEW_NAME}" >> $GITHUB_ENV

      - name: Write release notes
        run: |
          cat > release_notes.md << 'NOTES'
          ## Flux AudioVisualizer ${{ steps.version.outputs.version }}

          ### What's included
          - `flux-audiovisualizer-${{ steps.version.outputs.version }}.aar` — compiled Android library

          ### How to use
          1. Download the `.aar` file
          2. Copy it to your app's `libs/` folder
          3. Add to your `build.gradle.kts`:

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Flux AudioVisualizer ${{ steps.version.outputs.version }}"
          body_path: release_notes.md
          files: ${{ env.aar_file }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}