name: Build and Release AAR

# Triggers on every push to main branch
on:
  push:
    branches:
      - main

jobs:
  release:
    name: Build AAR and create GitHub Release
    runs-on: ubuntu-latest

    steps:

      # -----------------------------------------------------------------------
      # 1. Checkout the repository code
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed to count commits for versioning

      # -----------------------------------------------------------------------
      # 2. Set up Java 17 (required by Android Gradle Plugin)
      # -----------------------------------------------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # -----------------------------------------------------------------------
      # 3. Set up Android SDK
      # -----------------------------------------------------------------------
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # -----------------------------------------------------------------------
      # 4. Install NDK (required for C++ compilation)
      # -----------------------------------------------------------------------
      - name: Install NDK
        run: |
          echo "y" | sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"

      # -----------------------------------------------------------------------
      # 5. Cache Gradle dependencies to speed up future builds
      # -----------------------------------------------------------------------
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # -----------------------------------------------------------------------
      # 6. Grant execute permission to Gradle wrapper
      # -----------------------------------------------------------------------
      - name: Grant Gradle wrapper permissions
        run: chmod +x gradlew

      # -----------------------------------------------------------------------
      # 7. Generate version number from commit count
      #    Format: 1.0.<commit_count>
      #    Example: 1.0.24
      # -----------------------------------------------------------------------
      - name: Generate version name
        id: version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION="1.0.${COMMIT_COUNT}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Generated version: ${VERSION}"

      # -----------------------------------------------------------------------
      # 8. Build the release AAR
      # -----------------------------------------------------------------------
      - name: Build release AAR
        run: ./gradlew :audiovisualizer:assembleRelease

      # -----------------------------------------------------------------------
      # 9. Locate the generated AAR and rename it with version number
      # -----------------------------------------------------------------------
      - name: Rename AAR with version
        run: |
          AAR_PATH=$(find audiovisualizer/build/outputs/aar -name "*.aar" | head -1)
          NEW_NAME="flux-audiovisualizer-${{ steps.version.outputs.version }}.aar"
          cp "${AAR_PATH}" "${NEW_NAME}"
          echo "aar_file=${NEW_NAME}" >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # 10. Create the GitHub Release and upload the AAR
      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Flux AudioVisualizer ${{ steps.version.outputs.version }}"
          body: |
            ## Flux AudioVisualizer ${{ steps.version.outputs.version }}

            ### What's included
            - `flux-audiovisualizer-${{ steps.version.outputs.version }}.aar` — compiled Android library

            ### How to use
            1. Download the `.aar` file
            2. Copy it to your app's `libs/` folder
            3. Add to your `build.gradle.kts`:
            ```kotlin
            dependencies {
                implementation(files("libs/flux-audiovisualizer-${{ steps.version.outputs.version }}.aar"))
            }
            ```
          ### Commit
           ${{ github.sha }}
          files: ${{ env.aar_file }}
          draft: false
          prerelease: false
        env:
         GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}