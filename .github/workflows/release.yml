name: Build and Release AAR

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Build AAR and create GitHub Release
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          echo "y" | sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant Gradle wrapper permissions
        run: chmod +x gradlew

      # -----------------------------------------------------------------------
      # Generate version from commit count — format: 1.0.<count>
      # -----------------------------------------------------------------------
      - name: Generate version name
        id: version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION="1.0.${COMMIT_COUNT}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Build release AAR
        run: ./gradlew :audiovisualizer:assembleRelease

      # -----------------------------------------------------------------------
      # Locate the AAR and rename it with the version number
      # -----------------------------------------------------------------------
      - name: Rename AAR with version
        run: |
          AAR_PATH=$(find audiovisualizer/build/outputs/aar -name "*.aar" | head -1)
          NEW_NAME="flux-audiovisualizer-${{ steps.version.outputs.version }}.aar"
          cp "${AAR_PATH}" "${NEW_NAME}"
          echo "aar_file=${NEW_NAME}" >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # Create the GitHub Release
      # The body uses a heredoc to avoid backtick conflicts in YAML
      # -----------------------------------------------------------------------
      - name: Write release notes
        run: |
          cat > release_notes.md << 'NOTES'
          ## Flux AudioVisualizer ${{ steps.version.outputs.version }}

          ### What's included
          - `flux-audiovisualizer-${{ steps.version.outputs.version }}.aar` — compiled Android library

          ### How to use
          1. Download the `.aar` file
          2. Copy it to your app's `libs/` folder
          3. Add to your `build.gradle.kts`:

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Flux AudioVisualizer ${{ steps.version.outputs.version }}"
          body_path: release_notes.md
          files: ${{ env.aar_file }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}