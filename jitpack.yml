jdk:
  - openjdk17

before_install:
  - export JAVA_HOME_17=$JAVA_HOME
  - sdk install java 11.0.11-open || true
  - sdk use java 11.0.11-open
  - echo "y" | sdkmanager "ndk;27.0.12077973" "cmake;3.22.1" || true
  - sdk use java 17.0.12-oracle
  - export JAVA_HOME=$JAVA_HOME_17

install:
  - ./gradlew :audiovisualizer:publishToMavenLocal --no-daemon